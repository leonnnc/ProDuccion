<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Producción - Demo</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/modules/auth.css">
    <style>
        .demo-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        body { margin-top: 50px; }
        .demo-data {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="demo-banner">
        🎬 MODO DEMO - Sin conexión al servidor | Datos simulados para demostración
    </div>

    <div id="app-container">
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <p>Cargando Sistema de Gestión de Producción...</p>
        </div>
    </div>

    <script>
        // Aplicación Demo - Sin conexión a servidor
        class DemoApp {
            constructor() {
                this.currentUser = null;
                this.currentModule = 'dashboard';
                this.demoData = this.initDemoData();
                this.init();
            }

            initDemoData() {
                return {
                    users: [
                        { id: 1, nombre: 'Demo Usuario', email: 'demo@sistema.com', area_nombre: 'Coordinación' }
                    ],
                    projects: [
                        { id: 1, nombre: 'Proyecto Demo 1', estado: 'en_progreso', descripcion: 'Proyecto de demostración' },
                        { id: 2, nombre: 'Proyecto Demo 2', estado: 'planificacion', descripcion: 'Otro proyecto demo' }
                    ],
                    tasks: [
                        { id: 1, titulo: 'Tarea Demo 1', estado: 'pendiente', proyecto_nombre: 'Proyecto Demo 1' },
                        { id: 2, titulo: 'Tarea Demo 2', estado: 'completada', proyecto_nombre: 'Proyecto Demo 2' }
                    ]
                };
            }

            async init() {
                console.log('🎬 Iniciando aplicación en modo DEMO...');
                
                // Simular carga
                setTimeout(() => {
                    this.showLogin();
                }, 1000);
            }

            showLogin() {
                document.getElementById('app-container').innerHTML = `
                    <div class="login-container">
                        <div class="welcome-message">
                            <h1>🎬 Sistema de Gestión de Producción</h1>
                            <p>Gestiona proyectos, tareas y agenda de manera eficiente</p>
                            
                            <div class="demo-data">
                                <h3>🚀 Modo Demo Activo</h3>
                                <p><strong>Para probar:</strong></p>
                                <ul>
                                    <li>Email: <code>demo@sistema.com</code></li>
                                    <li>Contraseña: <code>demo123</code></li>
                                </ul>
                                <p><em>Los datos son simulados y no se guardan.</em></p>
                            </div>
                        </div>
                        
                        <div class="auth-section">
                            <form class="login-form" id="loginForm">
                                <h2 class="login-title">Iniciar Sesión (Demo)</h2>
                                <div id="loginMessage" class="message-container"></div>
                                
                                <div class="form-group">
                                    <label class="form-label" for="loginEmail">Email:</label>
                                    <input type="email" id="loginEmail" class="form-input" 
                                           value="demo@sistema.com" placeholder="demo@sistema.com">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="loginPassword">Contraseña:</label>
                                    <input type="password" id="loginPassword" class="form-input" 
                                           value="demo123" placeholder="demo123">
                                </div>
                                
                                <button type="submit" class="btn btn-primary" style="width: 100%;">
                                    🚀 Entrar al Demo
                                </button>
                                
                                <div class="auth-options">
                                    <p><strong>💡 Nota:</strong> Este es un demo sin servidor. Para la versión completa, configura un servidor web con PHP y MySQL.</p>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
                
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleDemoLogin();
                });
            }

            handleDemoLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const messageDiv = document.getElementById('loginMessage');

                // Simular validación
                if (email === 'demo@sistema.com' && password === 'demo123') {
                    this.currentUser = this.demoData.users[0];
                    messageDiv.innerHTML = '<div class="login-success">🎉 Acceso concedido. Cargando sistema...</div>';
                    
                    setTimeout(() => {
                        this.showMainApp();
                    }, 1500);
                } else {
                    messageDiv.innerHTML = '<div class="login-error">❌ Credenciales incorrectas. Usa: demo@sistema.com / demo123</div>';
                }
            }

            showMainApp() {
                document.getElementById('app-container').innerHTML = `
                    <div class="app-container">
                        <nav class="main-nav">
                            <div class="nav-brand">
                                <span class="nav-title">🎬 Gestión de Producción (Demo)</span>
                            </div>
                            
                            <div class="nav-menu">
                                <button class="nav-item ${this.currentModule === 'dashboard' ? 'active' : ''}" 
                                        onclick="demoApp.loadModule('dashboard')">
                                    <span class="nav-icon">🏠</span>
                                    <span class="nav-text">Dashboard</span>
                                </button>
                                <button class="nav-item ${this.currentModule === 'projects' ? 'active' : ''}" 
                                        onclick="demoApp.loadModule('projects')">
                                    <span class="nav-icon">📋</span>
                                    <span class="nav-text">Proyectos</span>
                                </button>
                                <button class="nav-item ${this.currentModule === 'tasks' ? 'active' : ''}" 
                                        onclick="demoApp.loadModule('tasks')">
                                    <span class="nav-icon">✅</span>
                                    <span class="nav-text">Tareas</span>
                                </button>
                                <button class="nav-item ${this.currentModule === 'calendar' ? 'active' : ''}" 
                                        onclick="demoApp.loadModule('calendar')">
                                    <span class="nav-icon">📅</span>
                                    <span class="nav-text">Agenda</span>
                                </button>
                            </div>
                            
                            <div class="nav-user">
                                <div class="user-info">
                                    <span class="user-name">${this.currentUser.nombre}</span>
                                    <span class="user-area">${this.currentUser.area_nombre}</span>
                                </div>
                                <button class="btn btn-sm" onclick="demoApp.logout()">Salir</button>
                            </div>
                        </nav>
                        
                        <main class="main-content" id="mainContent">
                            <div class="loading-content">
                                <div class="loading-spinner"></div>
                                <p>Cargando ${this.getModuleName(this.currentModule)}...</p>
                            </div>
                        </main>
                    </div>
                `;
                
                this.loadModule(this.currentModule);
            }

            loadModule(moduleName) {
                this.currentModule = moduleName;
                this.updateActiveNavigation(moduleName);
                
                const mainContent = document.getElementById('mainContent');
                
                switch(moduleName) {
                    case 'dashboard':
                        mainContent.innerHTML = this.renderDashboard();
                        break;
                    case 'projects':
                        mainContent.innerHTML = this.renderProjects();
                        break;
                    case 'tasks':
                        mainContent.innerHTML = this.renderTasks();
                        break;
                    case 'calendar':
                        mainContent.innerHTML = this.renderCalendar();
                        break;
                }
            }

            renderDashboard() {
                return `
                    <div class="dashboard-container">
                        <h1>🏠 Dashboard</h1>
                        
                        <div class="demo-data">
                            <h3>📊 Estadísticas Demo</h3>
                            <p>Estos datos son simulados para demostración.</p>
                        </div>
                        
                        <div class="dashboard-widgets">
                            <div class="widget">
                                <h3>📋 Proyectos Activos</h3>
                                <div class="widget-content">
                                    <span class="widget-number">${this.demoData.projects.length}</span>
                                    <span class="widget-label">En total</span>
                                </div>
                            </div>
                            <div class="widget">
                                <h3>✅ Tareas Pendientes</h3>
                                <div class="widget-content">
                                    <span class="widget-number">${this.demoData.tasks.filter(t => t.estado === 'pendiente').length}</span>
                                    <span class="widget-label">Por completar</span>
                                </div>
                            </div>
                            <div class="widget">
                                <h3>🎯 Completadas</h3>
                                <div class="widget-content">
                                    <span class="widget-number">${this.demoData.tasks.filter(t => t.estado === 'completada').length}</span>
                                    <span class="widget-label">Finalizadas</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="dashboard-actions">
                            <button class="btn" onclick="demoApp.loadModule('projects')">Ver Proyectos</button>
                            <button class="btn" onclick="demoApp.loadModule('tasks')">Ver Tareas</button>
                            <button class="btn" onclick="demoApp.loadModule('calendar')">Ver Agenda</button>
                        </div>
                    </div>
                `;
            }

            renderProjects() {
                const projectsHtml = this.demoData.projects.map(project => `
                    <div class="project-card">
                        <h3>${project.nombre}</h3>
                        <p>${project.descripcion}</p>
                        <span class="status-badge status-${project.estado}">${project.estado}</span>
                    </div>
                `).join('');

                return `
                    <div class="projects-container">
                        <h1>📋 Gestión de Proyectos</h1>
                        
                        <div class="demo-data">
                            <p>🎬 <strong>Demo:</strong> Proyectos simulados para demostración</p>
                        </div>
                        
                        <div class="projects-grid">
                            ${projectsHtml}
                        </div>
                    </div>
                `;
            }

            renderTasks() {
                const tasksHtml = this.demoData.tasks.map(task => `
                    <div class="task-card">
                        <h3>${task.titulo}</h3>
                        <p>Proyecto: ${task.proyecto_nombre}</p>
                        <span class="status-badge status-${task.estado}">${task.estado}</span>
                    </div>
                `).join('');

                return `
                    <div class="tasks-container">
                        <h1>✅ Gestión de Tareas</h1>
                        
                        <div class="demo-data">
                            <p>🎬 <strong>Demo:</strong> Tareas simuladas para demostración</p>
                        </div>
                        
                        <div class="tasks-grid">
                            ${tasksHtml}
                        </div>
                    </div>
                `;
            }

            renderCalendar() {
                return `
                    <div class="calendar-container">
                        <h1>📅 Agenda Mensual</h1>
                        
                        <div class="demo-data">
                            <p>🎬 <strong>Demo:</strong> Calendario simulado para demostración</p>
                        </div>
                        
                        <div class="calendar-placeholder">
                            <p>📅 Aquí se mostraría el calendario interactivo</p>
                            <p>Con eventos, disponibilidad y programación</p>
                        </div>
                    </div>
                `;
            }

            updateActiveNavigation(moduleName) {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                const activeItem = document.querySelector(`[onclick="demoApp.loadModule('${moduleName}')"]`);
                if (activeItem) {
                    activeItem.classList.add('active');
                }
            }

            getModuleName(moduleName) {
                const names = {
                    dashboard: 'Dashboard',
                    projects: 'Proyectos',
                    tasks: 'Tareas',
                    calendar: 'Agenda'
                };
                return names[moduleName] || moduleName;
            }

            logout() {
                this.currentUser = null;
                this.showLogin();
            }
        }

        // Inicializar aplicación demo
        window.demoApp = new DemoApp();
    </script>
</body>
</html>
