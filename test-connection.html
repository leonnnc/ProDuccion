<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Conexión API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔧 Test de Conexión API</h1>
    <p>Esta página te ayudará a diagnosticar problemas de conexión con la API.</p>
    
    <button onclick="testConnection()">🚀 Probar Conexión</button>
    <button onclick="testPHP()">🐘 Probar PHP</button>
    <button onclick="clearResults()">🧹 Limpiar</button>
    
    <div id="results"></div>

    <script>
        async function testConnection() {
            const resultsDiv = document.getElementById('results');
            addResult('🔍 Iniciando pruebas de conexión...', 'info');
            
            // URLs a probar
            const urls = [
                './api/auth/user',
                '/api/auth/user',
                'api/auth/user',
                './api/index.php',
                '/api/index.php',
                'api/index.php'
            ];
            
            for (let url of urls) {
                try {
                    addResult(`Probando: ${url}`, 'info');
                    const response = await fetch(url);
                    
                    if (response.ok || response.status === 401) {
                        addResult(`✅ ${url} - Funciona (${response.status})`, 'success');
                        
                        // Si es una respuesta JSON, mostrar contenido
                        try {
                            const data = await response.json();
                            addResult(`📄 Respuesta: ${JSON.stringify(data, null, 2)}`, 'info');
                        } catch (e) {
                            addResult(`📄 Respuesta no es JSON válido`, 'info');
                        }
                        break; // Si encontramos una URL que funciona, parar
                    } else {
                        addResult(`❌ ${url} - Error ${response.status}`, 'error');
                    }
                } catch (error) {
                    addResult(`❌ ${url} - Error: ${error.message}`, 'error');
                }
            }
        }
        
        async function testPHP() {
            addResult('🐘 Probando si PHP está funcionando...', 'info');
            
            try {
                const response = await fetch('./api/index.php');
                if (response.ok) {
                    addResult('✅ PHP está funcionando', 'success');
                    const text = await response.text();
                    addResult(`📄 Respuesta PHP: ${text.substring(0, 200)}...`, 'info');
                } else {
                    addResult(`❌ PHP no responde - Error ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Error conectando con PHP: ${error.message}`, 'error');
                addResult('💡 Posibles causas:', 'info');
                addResult('- El servidor web no está ejecutando PHP', 'info');
                addResult('- Los archivos no están en la ubicación correcta', 'info');
                addResult('- Hay un problema con la configuración del servidor', 'info');
            }
        }
        
        function addResult(message, type) {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        // Información del sistema
        addResult(`🌐 URL actual: ${window.location.href}`, 'info');
        addResult(`📍 Origen: ${window.location.origin}`, 'info');
        addResult(`📂 Ruta: ${window.location.pathname}`, 'info');
    </script>
</body>
</html>
